name: Build and Push Dev Container Images

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'base/**'
      - 'ada/**'
      - 'embedded/**'
      - 'build-images.sh'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., v1.0.0 or latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_BASE_NAME: devcontainer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            TAG="latest"
          else
            TAG="${{ github.sha }}"
          fi
          TAG=$(echo ${TAG} | tr '[:upper:]' '[:lower:]')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Set lowercase owner
        id: owner
        run: echo "name=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: ./base
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ env.IMAGE_BASE_NAME }}-base:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Ada image
        uses: docker/build-push-action@v6
        with:
          context: ./ada
          push: true
          build-args: |
            BASE_REGISTRY=${{ env.REGISTRY }}
            BASE_TAG=${{ steps.tag.outputs.tag }}
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ env.IMAGE_BASE_NAME }}-ada:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push RP2040 image
        uses: docker/build-push-action@v6
        with:
          context: ./embedded/rpi-pico
          push: true
          build-args: |
            ADA_REGISTRY=${{ env.REGISTRY }}
            ADA_TAG=${{ steps.tag.outputs.tag }}
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ env.IMAGE_BASE_NAME }}-rpi-pico:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ESP32-S3 image
        uses: docker/build-push-action@v6
        with:
          context: ./embedded/esp32s3
          push: true
          build-args: |
            ADA_REGISTRY=${{ env.REGISTRY }}
            ADA_TAG=${{ steps.tag.outputs.tag }}
          tags: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ env.IMAGE_BASE_NAME }}-esp32s3:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Owner:** ${{ steps.owner.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ env.IMAGE_BASE_NAME }}-base:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ env.IMAGE_BASE_NAME }}-ada:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ env.IMAGE_BASE_NAME }}-rpi-pico:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ env.IMAGE_BASE_NAME }}-esp32s3:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
